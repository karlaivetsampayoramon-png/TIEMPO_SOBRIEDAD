<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso privado</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f1f14;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
  text-align: center;
}
.hidden {
  display: none;
}
</style>
</head>

<body>

<div id="bloqueado">
  <h2>Acceso restringido</h2>
  <p>Escanea el código QR autorizado</p>
</div>

<div id="contenido" class="hidden">

<!-- AQUI VA TODO TU CONTADOR (NO LO BORRES) -->
<iframe src="app.html" style="width:100%;height:100vh;border:none;"></iframe>

</div>

<script>
// 🔑 CAMBIA ESTE CÓDIGO POR UNO QUE QUIERAS
const claveCorrecta = "9fK82jdLxPq71Z";

// leer URL
const params = new URLSearchParams(window.location.search);
const clave = params.get("access");

if (clave === claveCorrecta) {
  document.getElementById("bloqueado").style.display = "none";
  document.getElementById("contenido").classList.remove("hidden");
}
</script>

</body>
</html>
